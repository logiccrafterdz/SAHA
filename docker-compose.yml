version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# SAHA – Phase 2 Docker Compose
# Services: postgres | redis | saha-bus (Go) |
#           execution-api (:8001) | vendor-api (:8002) | eval-api (:8003) |
#           observability-api (:8004) | routing-api (:8005)
# ──────────────────────────────────────────────────────────────────────────────

x-python-common: &python-common
  build:
    context: .
    dockerfile: Dockerfile.python
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    saha-bus:
      condition: service_healthy
  restart: unless-stopped

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-saha}
      POSTGRES_USER:     ${POSTGRES_USER:-saha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saha} -d ${POSTGRES_DB:-saha}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Go Event Bus ─────────────────────────────────────────────────────────────

  saha-bus:
    build:
      context: ./bus
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      BUS_PORT:  "8090"
    ports:
      - "8090:8090"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Python Services ──────────────────────────────────────────────────────────

  execution-api:
    <<: *python-common
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        SERVICE_MODULE: services.execution_api.main
        SERVICE_PORT:   "8001"
    environment:
      SERVICE_MODULE: services.execution_api.main
      SERVICE_PORT:   "8001"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  vendor-api:
    <<: *python-common
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        SERVICE_MODULE: services.vendor_api.main
        SERVICE_PORT:   "8002"
    environment:
      SERVICE_MODULE: services.vendor_api.main
      SERVICE_PORT:   "8002"
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  eval-api:
    <<: *python-common
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        SERVICE_MODULE: services.eval_api.main
        SERVICE_PORT:   "8003"
    environment:
      SERVICE_MODULE: services.eval_api.main
      SERVICE_PORT:   "8003"
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  observability-api:
    <<: *python-common
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        SERVICE_MODULE: services.observability_api.main
        SERVICE_PORT:   "8004"
    environment:
      SERVICE_MODULE: services.observability_api.main
      SERVICE_PORT:   "8004"
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  routing-api:
    <<: *python-common
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        SERVICE_MODULE: services.routing_api.main
        SERVICE_PORT:   "8005"
    environment:
      SERVICE_MODULE: services.routing_api.main
      SERVICE_PORT:   "8005"
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
